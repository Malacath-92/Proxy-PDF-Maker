name: Ubuntu - x86

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ubuntu-debug:
    uses: ./.github/workflows/CI.yml
    with:
      os: Ubuntu-x86
      compiler: Gcc
      runs_on: ubuntu-24.04
      build_type: Debug
      cache_key: Ubuntu-x86-Debug
  ubuntu-release:
    uses: ./.github/workflows/CI.yml
    with:
      os: Ubuntu-x86
      compiler: Gcc
      runs_on: ubuntu-24.04
      build_type: Release
      cache_key: Ubuntu-x86-Release
