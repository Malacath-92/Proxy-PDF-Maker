name: Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  windows-debug:
    uses: ./.github/workflows/CI.yml
    with:
      os: Windows
      compiler: MSVC
      runs_on: windows-2022
      build_type: Debug
      cache_key: Windows-x86
  windows-release:
    uses: ./.github/workflows/CI.yml
    with:
      os: Windows
      compiler: MSVC
      runs_on: windows-2022
      build_type: Release
      cache_key: Windows-x86
